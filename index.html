<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>HabitFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #000000; --bg: #FFFFFF; --card-bg: #F8F8F8; --text-main: #000000; --text-sub: #8E8E93; --border: #E5E5E5; --danger: #FF3B30; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: env(safe-area-inset-bottom); overflow-x: hidden; }

        /* サイドナビ */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 75px; border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: white; z-index: 1000; }
        .nav-icon { margin-bottom: 35px; cursor: pointer; text-align: center; color: #BBB; transition: 0.2s; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .nav-icon.active { color: var(--primary); }
        .icon-svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }
        .icon-habits { font-size: 20px; display: block; font-weight: bold; }
        .nav-label { font-size: 10px; font-weight: 700; margin-top: 6px; }

        .main-content { margin-left: 75px; padding: 40px 25px; min-height: 100vh; }
        h1 { font-size: 26px; font-weight: 800; margin: 0 0 30px 0; }

        /* Habit List & Edit UI */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 40px; }
        input { border: 1.5px solid var(--border); border-radius: 8px; padding: 14px; font-size: 16px; width: 100%; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        .add-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 14px; font-weight: 800; font-size: 14px; cursor: pointer; }
        
        .habit-card { border: 1px solid var(--border); border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; background: white; }
        .check-box { width: 24px; height: 24px; border: 2px solid #D1D1D6; border-radius: 6px; margin-right: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .check-box.done { background: var(--primary); border-color: var(--primary); color: white; }
        .habit-info { flex: 1; cursor: pointer; }
        .habit-name { font-weight: 700; font-size: 16px; }
        
        /* 編集ボタン群 */
        .edit-actions { display: flex; gap: 12px; margin-left: 10px; }
        .btn-icon { background: none; border: none; font-size: 18px; cursor: pointer; color: #BBB; padding: 5px; }
        .btn-icon:hover { color: var(--primary); }
        .btn-delete { color: #E5E5E5; }
        .btn-delete:hover { color: var(--danger); }

        /* Insights Page */
        .progress-circle-box { position: relative; width: 240px; height: 240px; margin: 20px auto 40px; }
        .percentage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; width: 100%; }
        .percent-num { font-size: 52px; font-weight: 800; display: block; line-height: 1; }
        .percent-sub { font-size: 13px; font-weight: 600; color: #000; margin-top: 8px; display: block; }

        /* Notification Banner */
        .noti-banner { background: #F2F2F7; padding: 12px; border-radius: 8px; font-size: 12px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
        .noti-btn { background: var(--primary); color: white; border: none; border-radius: 4px; padding: 6px 12px; font-size: 10px; cursor: pointer; }

        /* Detail Page UI */
        .tab-bar { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 11px; font-weight: 800; color: #BBB; cursor: pointer; }
        .tab.active { color: var(--primary); background: #F2F2F7; border-radius: 8px 8px 0 0; }

        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-label { font-size: 11px; font-weight: 600; color: var(--text-sub); }
        .day-cell { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; z-index: 1; }
        .day-cell.done::after { content: ''; position: absolute; width: 30px; height: 30px; background: var(--primary); border-radius: 50%; z-index: -1; }
        .day-cell.done { color: white; font-weight: 700; }

        [hidden] { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-icon active" id="nav-habits" onclick="app.showPage('habits')"><span class="icon-habits">⊞</span><div class="nav-label">Habits</div></div>
    <div class="nav-icon" id="nav-insights" onclick="app.showPage('insights')">
        <svg class="icon-svg" viewBox="0 0 24 24"><line x1="6" y1="20" x2="6" y2="10" /><line x1="12" y1="20" x2="12" y2="4" /><line x1="18" y1="20" x2="18" y2="14" /></svg>
        <div class="nav-label">Insights</div>
    </div>
</div>

<div class="main-content">
    <div id="page-habits">
        <h1>HabitFlow</h1>
        <div id="notiRequest" class="noti-banner" hidden>
            <span>23時の通知リマインダーを有効にしますか？</span>
            <button class="noti-btn" onclick="app.requestNotification()">有効にする</button>
        </div>
        <div class="input-group">
            <span style="font-size: 14px; font-weight: 800;">Input new habits</span>
            <input type="text" id="habitInput" placeholder="Morning Meditation">
            <button class="add-btn" onclick="app.addHabit()">+ Add Habit</button>
        </div>
        <div id="habitList"></div>
    </div>

    <div id="page-insights" hidden>
        <h1>Today's Progress</h1>
        <div class="progress-circle-box">
            <canvas id="progressChart"></canvas>
            <div class="percentage"><span class="percent-num" id="percentText">0%</span><span class="percent-sub" id="progressSubtext">0/0 Completed</span></div>
        </div>
        <div id="dailyProgressList"></div>
    </div>

    <div id="page-detail" hidden>
        <div style="display:flex; align-items:center; margin-bottom:25px;">
            <span onclick="app.showPage('habits')" style="cursor:pointer; font-size:28px; padding-right:20px;">‹</span>
            <h2 id="detailTitle" style="margin:0; font-size:20px;">Detail</h2>
        </div>
        <div class="tab-bar">
            <div class="tab active" onclick="app.switchTab('cal', this)">CALENDAR</div>
            <div class="tab" onclick="app.switchTab('graph', this)">GRAPH</div>
            <div class="tab" onclick="app.switchTab('heat', this)">HEATMAP</div>
        </div>
        <div id="view-cal">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <span onclick="app.changeMonth(-1)" style="cursor:pointer; padding:5px 15px;">‹</span>
                <b id="calMonthText"></b>
                <span onclick="app.changeMonth(1)" style="cursor:pointer; padding:5px 15px;">›</span>
            </div>
            <div class="cal-grid" id="calendarGrid"></div>
        </div>
        <div id="view-graph" hidden><canvas id="detailGraphChart"></canvas></div>
        <div id="view-heat" hidden><div class="heatmap-grid" id="heatmapGrid"></div></div>
    </div>
</div>

<script>
class HabitFlow {
    constructor() {
        this.habits = JSON.parse(localStorage.getItem('hf_v27')) || [];
        this.currentMonth = new Date();
        this.charts = { progress: null, detail: null };
        this.init();
    }

    init() {
        this.renderHabitList();
        if ("Notification" in window && Notification.permission === "default") {
            document.getElementById('notiRequest').hidden = false;
        }
        this.setupReminder();
    }

    save() {
        localStorage.setItem('hf_v27', JSON.stringify(this.habits));
        this.renderHabitList();
    }

    addHabit() {
        const input = document.getElementById('habitInput');
        if (!input.value.trim()) return;
        this.habits.push({ id: Date.now(), name: input.value.trim(), dates: [] });
        input.value = '';
        this.save();
    }

    // 編集機能：インラインでタイトル修正
    editHabit(id) {
        const h = this.habits.find(x => x.id === id);
        const newName = prompt("習慣名を編集:", h.name);
        if (newName && newName.trim()) {
            h.name = newName.trim();
            this.save();
        }
    }

    // 削除機能：確認後に削除
    deleteHabit(id) {
        if (confirm("この習慣を削除しますか？これまでの記録もすべて消去されます。")) {
            this.habits = this.habits.filter(h => h.id !== id);
            this.save();
        }
    }

    renderHabitList() {
        const list = document.getElementById('habitList');
        const today = new Date().toLocaleDateString('sv-SE');
        list.innerHTML = '';
        this.habits.forEach(h => {
            const done = h.dates.includes(today);
            list.innerHTML += `
                <div class="habit-card">
                    <div class="check-box ${done ? 'done' : ''}" onclick="app.toggleCheck(${h.id})">${done ? '✓' : ''}</div>
                    <div class="habit-info" onclick="app.openDetail(${h.id})">
                        <div class="habit-name">${h.name}</div>
                        <div style="font-size:12px; color:var(--text-sub);">${this.getStreak(h)} Days Streak</div>
                    </div>
                    <div class="edit-actions">
                        <button class="btn-icon" onclick="event.stopPropagation(); app.editHabit(${h.id})">✎</button>
                        <button class="btn-icon btn-delete" onclick="event.stopPropagation(); app.deleteHabit(${h.id})">✕</button>
                    </div>
                </div>`;
        });
    }

    toggleCheck(id) {
        const h = this.habits.find(x => x.id === id);
        const today = new Date().toLocaleDateString('sv-SE');
        const idx = h.dates.indexOf(today);
        if (idx > -1) h.dates.splice(idx, 1);
        else h.dates.push(today);
        this.save();
    }

    getStreak(h) {
        let streak = 0, d = new Date();
        while(h.dates.includes(d.toLocaleDateString('sv-SE'))) { streak++; d.setDate(d.getDate()-1); }
        return streak;
    }

    // リマインダー通知の設定
    requestNotification() {
        Notification.requestPermission().then(perm => {
            if (perm === "granted") document.getElementById('notiRequest').hidden = true;
        });
    }

    setupReminder() {
        setInterval(() => {
            const now = new Date();
            // 23時ちょうど、かつ未達成の項目がある場合
            if (now.getHours() === 23 && now.getMinutes() === 0) {
                const today = new Date().toLocaleDateString('sv-SE');
                const uncompleted = this.habits.filter(h => !h.dates.includes(today));
                if (uncompleted.length > 0 && Notification.permission === "granted") {
                    new Notification("HabitFlow リマインダー", {
                        body: `未達成の習慣が ${uncompleted.length} 件あります。今日の仕上げをしましょう！`,
                        icon: "https://cdn-icons-png.flaticon.com/512/551/551001.png"
                    });
                }
            }
        }, 60000); // 1分ごとにチェック
    }

    showPage(pageId) {
        document.querySelectorAll('.main-content > div').forEach(p => p.hidden = true);
        document.getElementById(`page-${pageId}`).hidden = false;
        document.querySelectorAll('.nav-icon').forEach(i => i.classList.remove('active'));
        const nav = document.getElementById(`nav-${pageId === 'detail' ? 'habits' : pageId}`);
        if(nav) nav.classList.add('active');
        if(pageId === 'insights') this.renderInsights();
    }

    renderInsights() {
        const today = new Date().toLocaleDateString('sv-SE');
        const completed = this.habits.filter(h => h.dates.includes(today)).length;
        const total = this.habits.length || 0;
        const percent = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('percentText').innerText = `${percent}%`;
        document.getElementById('progressSubtext').innerText = `${completed}/${total} Completed`;

        const ctx = document.getElementById('progressChart').getContext('2d');
        if (this.charts.progress) this.charts.progress.destroy();
        this.charts.progress = new Chart(ctx, {
            type: 'doughnut',
            data: {
                datasets: [{
                    data: total === 0 ? [0, 1] : [completed, total - completed],
                    backgroundColor: ['#000', '#F2F2F7'],
                    borderWidth: 0
                }]
            },
            options: { cutout: '85%', plugins: { tooltip: { enabled: false } } }
        });
    }

    openDetail(id) {
        this.selectedHabit = this.habits.find(h => h.id === id);
        document.getElementById('detailTitle').innerText = this.selectedHabit.name;
        this.showPage('detail');
        this.renderCalendar();
    }

    renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        const y = this.currentMonth.getFullYear(), m = this.currentMonth.getMonth();
        document.getElementById('calMonthText').innerText = this.currentMonth.toLocaleDateString('en-US',{month:'short', year:'numeric'});
        ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
        const first = new Date(y, m, 1).getDay(), last = new Date(y, m+1, 0).getDate();
        for(let i=0; i<first; i++) grid.innerHTML += '<div></div>';
        for(let d=1; d<=last; d++) {
            const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            grid.innerHTML += `<div class="day-cell ${this.selectedHabit.dates.includes(ds)?'done':''}">${d}</div>`;
        }
    }
    
    changeMonth(diff) { this.currentMonth.setMonth(this.currentMonth.getMonth()+diff); this.renderCalendar(); }
    switchTab(type, el) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        ['cal', 'graph', 'heat'].forEach(v => document.getElementById(`view-${v}`).hidden = true);
        document.getElementById(`view-${type}`).hidden = false;
    }
}
const app = new HabitFlow();
</script>
</body>
</html>
