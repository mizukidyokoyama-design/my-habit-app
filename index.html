<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="white">
    <title>HabitFlow</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #000000; --bg: #FFFFFF; --card-bg: #F8F8F8; --text-main: #000000; --text-sub: #8E8E93; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); margin: 0; padding-bottom: env(safe-area-inset-bottom); }

        /* サイドナビ */
        .sidebar { position: fixed; left: 0; top: 0; bottom: 0; width: 75px; border-right: 1px solid #E5E5E5; display: flex; flex-direction: column; align-items: center; padding-top: 50px; background: white; z-index: 1000; }
        .nav-icon { margin-bottom: 35px; cursor: pointer; text-align: center; color: #BBB; transition: 0.2s; }
        .nav-icon.active { color: var(--primary); }
        .nav-icon span { font-size: 24px; display: block; }
        .nav-label { font-size: 10px; font-weight: 700; margin-top: 5px; }

        .main-content { margin-left: 75px; padding: 40px 25px; min-height: 100vh; }
        h1 { font-size: 26px; font-weight: 800; margin: 0 0 30px 0; }

        /* Habit List */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 35px; }
        input { border: 1px solid #E5E5E5; border-radius: 8px; padding: 14px; font-size: 16px; background: white; }
        .add-btn { background: var(--primary); color: white; border: none; border-radius: 8px; padding: 14px; font-weight: 800; font-size: 14px; }

        .habit-card { border: 1px solid #E5E5E5; border-radius: 12px; padding: 18px; margin-bottom: 12px; display: flex; align-items: center; background: white; }
        .check-box { width: 22px; height: 22px; border: 2px solid #D1D1D6; border-radius: 6px; margin-right: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; cursor: pointer; }
        .check-box.done { background: var(--primary); border-color: var(--primary); color: white; }
        .habit-info { flex: 1; cursor: pointer; }
        .habit-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }

        /* Insights (Progress) */
        .progress-circle-box { position: relative; width: 220px; height: 220px; margin: 40px auto; }
        .percentage { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
        .percent-num { font-size: 42px; font-weight: 800; display: block; }
        .percent-sub { font-size: 12px; font-weight: 600; color: var(--text-sub); }

        /* Detail (Calendar UI) */
        .detail-top { display: flex; align-items: center; margin-bottom: 25px; }
        .tab-bar { display: flex; border-bottom: 1px solid #E5E5E5; margin-bottom: 25px; }
        .tab { flex: 1; text-align: center; padding: 12px 0; font-size: 11px; font-weight: 800; color: #BBB; cursor: pointer; letter-spacing: 0.5px; }
        .tab.active { color: var(--primary); background: #F2F2F7; border-radius: 8px 8px 0 0; }

        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding: 0 10px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; text-align: center; }
        .day-label { font-size: 11px; font-weight: 600; color: var(--text-sub); margin-bottom: 10px; }
        .day-cell { height: 35px; display: flex; align-items: center; justify-content: center; font-size: 14px; position: relative; }
        .day-cell.done::after { content: ''; position: absolute; width: 30px; height: 30px; background: var(--primary); border-radius: 50%; z-index: -1; }
        .day-cell.done { color: white; font-weight: 700; }

        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .heat-cell { aspect-ratio: 1; border-radius: 2px; background: #E5E5E5; }
        .heat-cell.on { background: #333; }

        [hidden] { display: none !important; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="nav-icon active" id="nav-habits" onclick="app.showPage('habits')"><span>⊞</span><div class="nav-label">Habits</div></div>
    <div class="nav-icon" id="nav-insights" onclick="app.showPage('insights')"><span>📊</span><div class="nav-label">Insights</div></div>
</div>

<div class="main-content">
    <div id="page-habits">
        <h1>HabitFlow</h1>
        <div class="input-group">
            <span style="font-size: 14px; font-weight: 800;">Input new habits</span>
            <input type="text" id="habitInput" placeholder="Morning Meditation">
            <button class="add-btn" onclick="app.addHabit()">+ Add Habit</button>
        </div>
        <div id="habitList"></div>
    </div>

    <div id="page-insights" hidden>
        <h1>Today's Progress</h1>
        <div class="progress-circle-box">
            <canvas id="progressChart"></canvas>
            <div class="percentage">
                <span class="percent-num" id="percentText">0%</span>
                <span class="percent-sub" id="progressSubtext">0/0 Habits</span>
            </div>
        </div>
        <div id="dailyProgressList"></div>
    </div>

    <div id="page-detail" hidden>
        <div class="detail-top">
            <span onclick="app.showPage('habits')" style="cursor:pointer; font-size:24px;">‹</span>
